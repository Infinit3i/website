<!--
  Favicon override — uses site avatar gif instead of theme default.
-->

{% capture favicon_path %}{{ '/assets/Images/favicon-circle.png' | relative_url }}{% endcapture %}

<link rel="icon" type="image/png" href="{{ favicon_path }}">
<link rel="shortcut icon" type="image/png" href="{{ favicon_path }}">
<link rel="apple-touch-icon" href="{{ favicon_path }}">
{% if site.pwa.enabled %}
  <link rel="manifest" href="{{ '/assets/img/favicons/site.webmanifest' | relative_url }}">
{% endif %}
